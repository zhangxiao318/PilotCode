name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy
    
    - name: Lint with ruff
      run: ruff check src/pilotcode
    
    - name: Check formatting with black
      run: black --check src/pilotcode
    
    - name: Type check with mypy
      run: mypy src/pilotcode --ignore-missing-imports || true

  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run unit tests
      run: |
        pytest tests/unit -v --tb=short \
          --cov=pilotcode \
          --cov-report=xml \
          --cov-report=term-missing \
          -m "not integration and not e2e and not network and not slow"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run integration tests
      run: |
        pytest tests/integration -v --tb=short -m "integration"
      continue-on-error: true

  # ============================================================================
  # Network Tests
  # ============================================================================
  network-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run network tests
      run: |
        pytest tests/ -v --tb=short -m "network" || true
      continue-on-error: true
      timeout-minutes: 5

  # ============================================================================
  # Tool Tests
  # ============================================================================
  tool-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tool tests
      run: |
        pytest tests/unit/tools -v --tb=short
    
    - name: Run comprehensive tool test
      run: |
        python test_all_tools.py || true

  # ============================================================================
  # Plugin Unit Tests
  # ============================================================================
  plugin-unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pyyaml  # Required for plugin tests
    
    - name: Run plugin unit tests
      run: |
        pytest tests/plugins/unit -v --tb=short \
          --cov=pilotcode.plugins \
          --cov-report=xml:plugin-coverage.xml \
          --cov-report=term-missing
    
    - name: Upload plugin coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./plugin-coverage.xml
        flags: plugin-unittests
        name: plugin-codecov

  # ============================================================================
  # Plugin Integration Tests
  # ============================================================================
  plugin-integration-tests:
    runs-on: ubuntu-latest
    needs: plugin-unit-tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install pyyaml
    
    - name: Run plugin integration tests
      run: |
        pytest tests/plugins/integration -v --tb=short -m "plugin_integration" || true
      continue-on-error: true

  # ============================================================================
  # E2E Tests
  # ============================================================================
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run E2E tests
      run: |
        pytest tests/e2e -v --tb=short -m "e2e" || true
      continue-on-error: true
      timeout-minutes: 10

  # ============================================================================
  # Build Test
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check package with twine
      run: twine check dist/*

  # ============================================================================
  # Summary
  # ============================================================================
  test-summary:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, tool-tests, plugin-unit-tests]
    if: always()
    
    steps:
    - name: Test Summary
      run: |
        echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Tool Tests | ${{ needs.tool-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Plugin Unit Tests | ${{ needs.plugin-unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
